# Usage (host stays clean — everything runs in the container):
#   docker compose build
#   docker compose run --rm app npm install         # one-off: deps -> volume, lockfile -> host
#   docker compose up                               # dev server, default --tunnel (scan QR in Expo Go)
#   docker compose run --rm --service-ports app npm run web   # web preview at http://localhost:8081
#   docker compose run --rm app npm test            # tests
#   docker compose run --rm app npm run lint        # lint
services:
  app:
    build: .
    image: vestel-purifier-dev
    working_dir: /app
    volumes:
      - .:/app:z                 # source (bind); :z for Fedora/SELinux
      - node_modules:/app/node_modules  # deps live in Docker, not on the host
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - EXPO_NO_TELEMETRY=1
      # For LAN/QR (non-tunnel) preview, set to your host LAN IP before `up`.
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-}
    stdin_open: true
    tty: true

volumes:
  node_modules:
