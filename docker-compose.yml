# Usage (host stays clean — everything runs in the container; works on Linux, macOS, Windows):
#   docker compose build
#   docker compose run --rm app npm install                   # one-off: deps -> volume, lockfile -> host
#   ./scripts/start.sh        (Linux/macOS)                   # LAN dev server; auto-detects host IP; scan QR
#   scripts\start.ps1         (Windows PowerShell)            # same, for Windows
#   docker compose run --rm --service-ports app npm run web   # web preview at http://localhost:8081
#   docker compose run --rm app npm run start:tunnel          # off-network fallback (ngrok)
#   docker compose run --rm app npm test / npm run lint       # tests / lint
# Manual LAN (skip the launcher):
#   REACT_NATIVE_PACKAGER_HOSTNAME=<ip> EXPO_PACKAGER_PROXY_URL=http://<ip>:8081 docker compose up
services:
  app:
    build: .
    image: vestel-purifier-dev
    working_dir: /app
    volumes:
      - .:/app:z                        # source (bind); :z is for Fedora/SELinux, a no-op on Docker Desktop
      - node_modules:/app/node_modules  # deps live in Docker, not on the host
    # Metro / Expo Go / web all use 8081 on SDK 54. Phones reach the host's
    # published 8081; the manifest advertises REACT_NATIVE_PACKAGER_HOSTNAME.
    ports:
      - "8081:8081"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - EXPO_NO_TELEMETRY=1
      # Host LAN IP so the QR points at this machine (the launcher scripts set these).
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-}
      - EXPO_PACKAGER_PROXY_URL=${EXPO_PACKAGER_PROXY_URL:-}
    stdin_open: true
    tty: true

volumes:
  node_modules:
